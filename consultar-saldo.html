<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokemon Bank - Consultar Saldo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="box-system-page">

<div class="container-fluid py-4">

    <div class="row mb-3">
        <div class="col-12 d-flex justify-content-end gap-2">
            <a href="MenuPrincipal.html" class="btn btn-top-action">MENÚ PRINCIPAL</a>
            <a href="index.html" class="btn btn-top-action">CERRAR SESIÓN</a>
        </div>
    </div>

    <div class="text-center mb-4">
        <h3 style="font-family:'Press Start 2P', cursive; color:#4a5c78;">
            CONSULTAR SALDO
        </h3>
    </div>

    <div class="row">
        <div class="col-lg-6 col-md-8 col-sm-10 mx-auto">

            <div class="left-data-panel">

                <div class="panel-header">
                    INFORMACIÓN DE LA CUENTA
                </div>

                <div class="panel-content text-center">

                    <h4 id="nombreUsuario" class="mb-3">Bienvenido</h4>

                    <p>
                        <strong>Número de cuenta:</strong>
                        <span id="numeroCuenta">---</span>
                    </p>

                    <div class="saldo-box mt-4">
                        <p class="mb-1">Saldo disponible</p>
                        <h1 id="saldoActual">$0.00</h1>
                    </div>

                    <div class="mt-4">
                        <a href="MenuPrincipal.html" class="btn btn-pkmn-pay">
                            Regresar
                        </a>
                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<script src="js/app.js"></script>

<script>
    function renderSaldo() {
        const user = getUser();

        document.getElementById("nombreUsuario").innerText =
            "Bienvenido " + user.nombre;

        document.getElementById("numeroCuenta").innerText =
            user.cuenta;

        document.getElementById("saldoActual").innerText =
            "$" + getBalance().toFixed(2);
    }

    renderSaldo();
</script>

</body>
</html>
