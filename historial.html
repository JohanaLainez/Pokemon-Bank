<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Bank - Historial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="menu-page">

<div class="container py-4">
    <h2 class="titulo-menu">Historial de transacciones</h2>

    <div class="grafica-box mt-4">
        <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle mb-0" style="background: white;">
                <thead>
                    <tr>
                        <th>Tipo</th>
                        <th>Cuenta</th>
                        <th>Monto</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="historialBody">
                    <tr>
                        <td colspan="4" class="text-center">Cargando historial...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="MenuPrincipal.html" class="btn btn-menu">Volver al menú</a>
    </div>
</div>

<script>
    // Claves para localStorage
    const TRANS_KEY = "pokemonBankTransactions";

    // Obtiene todas las transacciones guardadas
    function getTransactions() {
        return JSON.parse(localStorage.getItem(TRANS_KEY)) || [];
    }

    // Muestra el historial en la tabla
    function renderHistory() {
        const tbody = document.getElementById("historialBody");
        const transacciones = getTransactions();

     // Si no muestra transacciones, muestra un mensaje
        if (transacciones.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="text-center">No hay transacciones registradas.</td>
                </tr>
            `;
            return;
        }

        // Limpia la tabla antes de insertar las transacciones
        tbody.innerHTML = "";

        // Recorre las transacciones en orden inverso (más recientes primero)
        // Se invierte el orden para mostrar las transacciones más recientes al principio
        transacciones.slice().reverse().forEach(t => {
            const fila = document.createElement("tr");
            fila.innerHTML = `
                <td>${t.tipo}</td>
                <td>${t.cuenta}</td>
                <td>$${Number(t.monto).toFixed(2)}</td>
                <td>${t.fecha}</td>
            `;
            tbody.appendChild(fila);
        });
    }

    // Carga el historial al cargar la página
    renderHistory();
</script>

</body>
</html>
