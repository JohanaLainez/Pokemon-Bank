<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokemon Bank - Retiro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="retiro-page">

    <div class="atm-wrapper">

        <div class="side-buttons left-side">
            <button class="btn-side" onclick="seleccionarMonto(5)">5</button>
            <button class="btn-side" onclick="seleccionarMonto(10)">10</button>
            <button class="btn-side" onclick="seleccionarMonto(20)">20</button>
            <button class="btn-side" onclick="seleccionarMonto(40)">40</button>
        </div>

        <div class="retiro-panel">
            <h1 class="retiro-title">Retirar dinero</h1>

            <p class="retiro-subtitle">
                Ingrese el monto a retirar
            </p>

            <input
                type="number"
                id="montoRetiro"
                class="retiro-input"
                placeholder="Ingrese cantidad requerida manualmente"
                min="1"
            >

            <div class="saldo-box text-center mt-3">
                <p>Saldo actual:</p>
                <h2 id="saldoActual">$0.00</h2>
            </div>

            <div class="center-actions">
                <button class="btn-main" onclick="confirmarRetiro()">
                    Confirmar retiro
                </button>

                <a href="MenuPrincipal.html" class="btn-main btn-cancel">
                    Cancelar
                </a>
            </div>
        </div>

        <div class="side-buttons right-side">
            <button class="btn-side" onclick="seleccionarMonto(60)">60</button>
            <button class="btn-side" onclick="seleccionarMonto(80)">80</button>
            <button class="btn-side" onclick="seleccionarMonto(100)">100</button>
            <button class="btn-side" onclick="seleccionarMonto(120)">120</button>
        </div>

    </div>

    <script src="js/app.js"></script>

    <script>
        function seleccionarMonto(monto) {
            document.getElementById("montoRetiro").value = monto;
        }

        function renderBalance() {
            document.getElementById("saldoActual").innerText =
                "$" + getBalance().toFixed(2);
        }

        function confirmarRetiro() {
            const input = document.getElementById("montoRetiro");
            const monto = Number(input.value);
            const saldoActual = getBalance();

            if (!monto || monto <= 0) {
                Swal.fire({
                    icon: "error",
                    title: "¡Oops!",
                    text: "Ingrese un monto válido.",
                    confirmButtonColor: "#2A6DB5"
                });
                return;
            }

            if (monto > saldoActual) {
                Swal.fire({
                    icon: "error",
                    title: "Saldo insuficiente",
                    text: "No tienes suficiente saldo para realizar este retiro.",
                    confirmButtonColor: "#2A6DB5"
                });
                return;
            }

            Swal.fire({
                title: "¿Confirmar retiro?",
                text: `Vas a retirar $${monto.toFixed(2)}`,
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "¡Sí, retirar!",
                cancelButtonText: "Revisar",
                confirmButtonColor: "#60c060",
                cancelButtonColor: "#d86060"
            }).then((result) => {
                if (result.isConfirmed) {

                    const nuevoSaldo = saldoActual - monto;
                    saveBalance(nuevoSaldo);

                    const transacciones = getTransactions();

                    transacciones.push({
                        tipo: "Retiro",
                        monto: monto,
                        fecha: new Date().toLocaleString()
                    });

                    saveTransactions(transacciones);

                    Swal.fire({
                        title: "¡Retiro realizado!",
                        text: "Tu transacción se procesó con éxito.",
                        icon: "success",
                        confirmButtonColor: "#2A6DB5"
                    }).then(() => {
                        generarComprobantePDF("Retiro", monto, "Retiro en ATM");
                        input.value = "";
                        renderBalance();
                    });
                }
            });
        }

        renderBalance();
    </script>

</body>
</html>
