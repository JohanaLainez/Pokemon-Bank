<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokemon Bank - Menú principal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="menu-page">

<div class="container">

    <h2 class="titulo-menu">Pokemon Bank ATM</h2>
    <hr>

    <h4 class="texto-game" id="bienvenida">Bienvenido</h4>
    <p class="texto-game">
        <strong>Número de cuenta:</strong>
        <span id="numeroCuenta">---</span>
    </p>

    <div class="row g-3 mt-4">
        <div class="col-12 col-md-3">
            <a href="depositos.html" class="btn btn-menu w-100">Depositar</a>
        </div>

        <div class="col-12 col-md-3">
            <a href="Retirar.html" class="btn btn-menu w-100">Retirar dinero</a>
        </div>

        <div class="col-12 col-md-3">
            <a href="consultar-saldo.html" class="btn btn-menu w-100">Consultar saldo</a>
        </div>

        <div class="col-12 col-md-3">
            <a href="pagar-servicios.html" class="btn btn-menu w-100">Pagar servicios</a>
        </div>
    </div>

    <div class="row g-3 mt-3">
        <div class="col-12 col-md-4">
            <a href="historial.html" class="btn btn-menu w-100">Historial de transacciones</a>
        </div>

        <div class="col-12 col-md-4">
            <a href="grafica.html" class="btn btn-menu w-100">Gráfica de movimientos</a>
        </div>

        <div class="col-12 col-md-4">
            <a href="Logout.html" class="btn btn-menu w-100">Cerrar sesión</a>
        </div>
    </div>

</div>


<script src="js/app.js"></script>

<script>
    function cargarDatosUsuario() {
        const user = getUser();

        document.getElementById("bienvenida").innerText =
            "Bienvenido " + user.nombre;

        document.getElementById("numeroCuenta").innerText =
            user.cuenta;
    }

    cargarDatosUsuario();
</script>

</body>
</html>
