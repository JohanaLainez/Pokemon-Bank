<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfica de movimientos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="menu-page">

    <div class="container py-5">
        <h2 class="titulo-game text-center">Gráfica de movimientos</h2>

        <div class="grafica-box">
            <canvas id="graficaMovimientos"></canvas>
        </div>

        <div class="text-center mt-4">
            <a href="MenuPrincipal.html" class="btn btn-menu">Volver al menú</a>
        </div>
    </div>

    <!-- Archivo general con LocalStorage -->
    <script src="js/app.js"></script>

    <script>
        const transacciones = getTransactions();

        let totalDepositos = 0;
        let totalRetiros = 0;
        let totalServicios = 0;

        transacciones.forEach(t => {
            const tipo = t.tipo.toLowerCase();
            const monto = Number(t.monto);

            if (tipo.includes("depósito") || tipo.includes("deposito")) {
                totalDepositos += monto;
            } else if (tipo.includes("retiro")) {
                totalRetiros += monto;
            } else if (tipo.includes("servicio")) {
                totalServicios += monto;
            }
        });

        const ctx = document.getElementById('graficaMovimientos');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Depósitos', 'Retiros', 'Servicios'],
                datasets: [{
                    label: 'Monto en dólares',
                    data: [totalDepositos, totalRetiros, totalServicios],
                    backgroundColor: [
                        '#ffffff',
                        '#dfe8ff',
                        '#bcd4ff'
                    ],
                    borderColor: [
                        '#2A6DB5',
                        '#2A6DB5',
                        '#2A6DB5'
                    ],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: 'white',
                            font: {
                                family: 'Poppins',
                                size: 14
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: 'white',
                            font: {
                                family: 'Poppins',
                                size: 12
                            }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: 'white',
                            font: {
                                family: 'Poppins',
                                size: 12
                            }
                        }
                    }
                }
            }
        });
    </script>

</body>
</html>
