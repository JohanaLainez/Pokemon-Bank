<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Bank - Pagar Servicios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="box-system-page">

<div class="container-fluid py-3">
    
    <div class="row mb-3">
        <div class="col-12 d-flex justify-content-end gap-2">
            <a href="MenuPrincipal.html" class="btn btn-top-action">MENÚ PRINCIPAL</a>
            <a href="index.html" class="btn btn-top-action">CERRAR SESIÓN</a>
        </div>
    </div>

    <div class="row layout-container">
        
        <div class="col-lg-4 col-md-5 mb-4">
            <div class="left-data-panel">
                <div class="panel-header">DATOS DE PAGO</div>
                <div id="form-container" class="panel-content">
                    <p class="empty-msg">Selecciona una empresa en la caja para continuar.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-8 col-md-7">
            
            <div class="box-nav d-flex justify-content-between align-items-center mb-2">
                <button id="prev-btn" class="arrow-btn">◄</button>
                <h3 id="category-title" class="mb-0 text-center">ENERGÍA ELÉCTRICA</h3>
                <button id="next-btn" class="arrow-btn">►</button>
            </div>

            <div class="main-box-container">
                <div id="tiles-container" class="row g-3">
                    </div>
            </div>

        </div>
    </div>

</div>

<script>
    const data = [
        { category: "ENERGÍA ELÉCTRICA", companies: ["AESS", "CLESA", "EEO", "DEUSEM", "DELSUR"] },
        { category: "INTERNET/TELEFONÍA", companies: ["CLARO", "MOVISTAR", "TIGO", "CableColor"] },
        { category: "AGUA POTABLE", companies: ["ANDA", "Aqua Services", "Transportes Callejas", "Ramaga"] }
    ];

    let currentIndex = 0;
    const categoryTitle = document.getElementById("category-title");
    const tilesContainer = document.getElementById("tiles-container");
    const formContainer = document.getElementById("form-container");

    function renderBox(index) {
        categoryTitle.innerText = data[index].category;
        tilesContainer.innerHTML = "";
        formContainer.innerHTML = '<p class="empty-msg">Selecciona una empresa en la caja para continuar.</p>';

        data[index].companies.forEach(company => {
            const col = document.createElement("div");
            col.className = "col-6 col-sm-4 col-md-3";
            col.innerHTML = `
                <div class="pokemon-tile" onclick="showForm('${company}')">
                    <div class="tile-icon">🏢</div>
                    <div class="tile-name">${company}</div>
                </div>
            `;
            tilesContainer.appendChild(col);
        });
    }

    function showForm(selectedCompany) {
        formContainer.innerHTML = `
            <div class="payment-form" id="payment-form">
                <label>Empresa seleccionada:</label>
                <input type="text" class="form-control pkmn-input mb-3" value="${selectedCompany}" id="empresa" readonly>

                <label>N° de Cuenta / Recibo:</label>
                <input type="text" name="cuenta" id="cuenta" class="form-control pkmn-input mb-3" placeholder="Ej: 12345678">

                <label>Total a depositar ($):</label>
                <input type="number" name="monto" id="monto" class="form-control pkmn-input mb-4" placeholder="0.00" step="0.01">

                <div class="d-flex gap-2">
                    <button class="btn btn-pkmn-cancel w-50" onclick="renderBox(currentIndex)">Cancelar</button>
                    <button class="btn btn-pkmn-pay w-50" onclick="procesarPago()">Pagar</button>
                </div>
            </div>
        `;
    }

    // aqui se hace Validación y usamos SweetAlert
    function procesarPago() {
        // 1. Definir restricciones para Validate.js
        const constraints = {
            cuenta: {
                presence: { allowEmpty: false, message: "es obligatoria" },
                format: {
                    pattern: "[0-9]+",
                    message: "solo debe contener números"
                }
            },
            monto: {
                presence: { allowEmpty: false, message: "es obligatorio" },
                numericality: {
                    greaterThan: 0,
                    message: "debe ser mayor a 0"
                }
            }
        };

        // 2. Capturar valores
        const values = {
            cuenta: document.getElementById("cuenta").value,
            monto: document.getElementById("monto").value
        };

        // 3. Validar
        const errors = validate(values, constraints);

        if (errors) {
            // error que se muestra con SweetAlert por si la validación falla
            let errorMsg = Object.values(errors).join("<br>");
            Swal.fire({
                icon: 'error',
                title: '¡Oops!',
                html: errorMsg,
                confirmButtonColor: '#2A6DB5'
            });
        } else {
            // Confirmación de éxito con SweetAlert
            Swal.fire({
                title: '¿Confirmar pago?',
                text: `Vas a pagar $${values.monto} a ${document.getElementById("empresa").value}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '¡Sí, pagar!',
                cancelButtonText: 'Revisar',
                confirmButtonColor: '#60c060',
                cancelButtonColor: '#d86060'
            }).then((result) => {
            // Capturar datos del formulario
                if (result.isConfirmed) {
                    const empresa = document.getElementById("empresa").value;
                    const cuenta = document.getElementById("cuenta").value;
                    const monto = Number(document.getElementById("monto").value);
            // Obtiene transacciones actuales, agrega la nueva y guarda en LocalStorage
                    const transactions = getTransactions();
                    transactions.push({
                        tipo: "pago de servicios",
                        empresa: empresa,
                        cuenta: cuenta,
                        monto: monto,
                        fecha: new Date().toLocaleString()
                    });
                    saveTransactions(transactions);

    
            // confirmación de éxito con SweetAlert
                     Swal.fire ({
                        title: '¡Pago Realizado!',
                        text: 'Tu transacción se procesó con éxito.',
                        icon: 'success',
                        confirmButtonColor: '#2A6DB5'
                    }).then(() => {
                        renderBox(currentIndex); 
                    });
                }
            });
        }
    }

    // Eventos de flechas
    document.getElementById("prev-btn").addEventListener("click", () => {
        currentIndex = (currentIndex === 0) ? data.length - 1 : currentIndex - 1;
        renderBox(currentIndex);
    });

    document.getElementById("next-btn").addEventListener("click", () => {
        currentIndex = (currentIndex === data.length - 1) ? 0 : currentIndex + 1;
        renderBox(currentIndex);
    });

    renderBox(currentIndex);

    // Claves para LocalStorage
    const TRANS_KEY = "pokemonBankTransactions";
const BALANCE_KEY = "pokemonBankBalance";

    // LocalStorage 
function getTransactions() {
    return JSON.parse(localStorage.getItem(TRANS_KEY)) || [];
}

function saveTransactions(transactions) {
    localStorage.setItem(TRANS_KEY, JSON.stringify(transactions));
}

</script>

</body>
</html>
