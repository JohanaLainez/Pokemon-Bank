<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Bank - Depósitos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="box-system-page">
<div class="container-fluid py-4">

    <div class="row mb-3">
        <div class="col-12 d-flex justify-content-end gap-2">
            <a href="MenuPrincipal.html" class="btn btn-top-action">MENÚ PRINCIPAL</a>
            <a href="index.html" class="btn btn-top-action">CERRAR SESIÓN</a>
        </div>
    </div>

    <div class="text-center mb-4">
        <h3 style="font-family:'Press Start 2P', cursive; color:#4a5c78;">
            DEPÓSITOS
        </h3>
    </div>

    <div class="row">
        <div class="col-lg-6 col-md-8 col-sm-10 mx-auto">

            <div class="left-data-panel">

                <div class="panel-header">
                    DATOS DEL DEPÓSITO
                </div>

                <div class="panel-content">

                    <label>Número de cuenta:</label>
                    <input type="text" id="cuenta"
                        class="form-control pkmn-input mb-3" 
                        placeholder="Ej: 000223">

                    <label>Monto a depositar:</label>
                    <input type="number" id="monto"
                        class="form-control pkmn-input mb-3"
                        step="0.01"
                        placeholder="Ej: 100.00">

                    <div class="d-flex gap-2">
                        <button class="btn btn-pkmn-cancel w-50"
                            onclick="limpiarFormulario()">Limpiar</button>

                        <button class="btn btn-pkmn-pay w-50"
                            onclick="hacerDeposito()">Depositar</button>
                    </div>

                    <div class="mt-4 saldo-box text-center">
                        <p class="mb-1">Saldo actual</p>
                        <h1 id="saldoActual">$0.00</h1>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

<script>
// Claves para LocalStorage
const TRANS_KEY = "pokemonBankTransactions";
const BALANCE_KEY = "pokemonBankBalance";

// LocalStorage
function getTransactions() {
    return JSON.parse(localStorage.getItem(TRANS_KEY)) || [];
}

function saveTransactions(transactions) {
    localStorage.setItem(TRANS_KEY, JSON.stringify(transactions));
}

function getBalance() {
    return Number(localStorage.getItem(BALANCE_KEY)) || 0;
}

function saveBalance(balance) {
    localStorage.setItem(BALANCE_KEY, balance);
}

// Muestra el saldo actual en la interfaz
function renderBalance() {
    document.getElementById("saldoActual").innerText =
        "$" + getBalance().toFixed(2);
}

// Se realiza el depósito
function hacerDeposito() {

    const cuenta = document.getElementById("cuenta").value.trim();
    const monto = Number(document.getElementById("monto").value);

    // Validación
    if (!cuenta || monto <= 0) {
        Swal.fire({
            icon: 'error',
            title: '¡Oops!',
            text: 'Ingrese datos válidos.',
            confirmButtonColor: '#2A6DB5'
        });
        return;
    }

    // Confirmación antes de guardar
    Swal.fire({
        title: '¿Confirmar depósito?',
        text: `Vas a depositar $${monto} a la cuenta ${cuenta}`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '¡Sí, depositar!',
        cancelButtonText: 'Revisar',
        confirmButtonColor: '#60c060',
        cancelButtonColor: '#d86060'
    }).then((result) => {
        if (result.isConfirmed) {

            // Se actualiza el saldo
            const nuevoSaldo = getBalance() + monto;
            saveBalance(nuevoSaldo);

            // Se guarda la transacción en el historial
            const transacciones = getTransactions();

            transacciones.push({
                tipo: "Depósito",
                cuenta: cuenta,
                monto: monto,
                fecha: new Date().toLocaleString()
            });

            saveTransactions(transacciones);

            // Mensaje de éxito
            Swal.fire({
                title: '¡Depósito realizado!',
                text: 'Tu transacción se procesó con éxito.',
                icon: 'success',
                confirmButtonColor: '#2A6DB5'
            }).then(() => {
                limpiarFormulario();
                renderBalance();
            });
        }
    });
}

// Limpia los campos del formulario
function limpiarFormulario() {
    document.getElementById("cuenta").value = "";
    document.getElementById("monto").value = "";
}

// Inicia mostrando el saldo actual al cargar la página
renderBalance();
</script>

</body>
</html>
